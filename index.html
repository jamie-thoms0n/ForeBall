<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101612">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ForeBall">
    <title>ForeBall Golf Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ForeBall</p>
          <h1 id="screenTitle">Scorecard</h1>
        </div>
        <div class="running-score" id="runningScore">E</div>
      </header>

      <nav class="tabs" aria-label="Primary">
        <button class="tab is-active" type="button" data-view="scorecard">Scorecard</button>
        <button class="tab" type="button" data-view="analytics">Analytics</button>
        <button class="tab" type="button" data-view="rounds">Rounds</button>
      </nav>

      <main>
        <section id="scorecardView" class="view is-active">
          <div id="startPanel" class="panel">
            <h2>Start Round</h2>
            <label for="courseSelect">Course</label>
            <select id="courseSelect"></select>
            <button class="primary-action" type="button" id="startRoundBtn">Start round</button>
            <button class="secondary-action hidden" type="button" id="resumeRoundBtn">Resume active round</button>
          </div>

          <form id="holeForm" class="panel hidden" autocomplete="off">
            <div class="hole-header">
              <div>
                <p class="eyebrow" id="courseName"></p>
                <h2 id="holeTitle">Hole 1</h2>
              </div>
              <div class="hole-par" id="holePar">Par 4</div>
            </div>

            <div class="score-stepper">
              <button type="button" class="round-button" data-step="-1" aria-label="Decrease score">-</button>
              <div>
                <label for="scoreInput">Score</label>
                <input id="scoreInput" name="score" type="number" inputmode="numeric" min="1" required>
              </div>
              <button type="button" class="round-button" data-step="1" aria-label="Increase score">+</button>
            </div>

            <div class="toggle-grid">
              <fieldset id="firField">
                <legend>Fairway</legend>
                <div class="segmented">
                  <label><input type="radio" name="fir" value="true">Yes</label>
                  <label><input type="radio" name="fir" value="false">No</label>
                </div>
              </fieldset>
              <fieldset>
                <legend>GIR</legend>
                <div class="segmented">
                  <label><input type="radio" name="gir" value="true">Yes</label>
                  <label><input type="radio" name="gir" value="false">No</label>
                </div>
              </fieldset>
            </div>

            <div class="field-grid">
              <div id="driveField">
                <label for="driveDistanceInput">Drive yards</label>
                <input id="driveDistanceInput" name="driveDistance" type="number" inputmode="numeric" min="1">
              </div>
              <div>
                <label for="approachDistanceInput">Approach yards</label>
                <input id="approachDistanceInput" name="approachDistance" type="number" inputmode="numeric" min="1" required>
              </div>
            </div>

            <fieldset>
              <legend>Approach hit</legend>
              <div class="segmented">
                <label><input type="radio" name="approachHit" value="true">Hit</label>
                <label><input type="radio" name="approachHit" value="false">Miss</label>
              </div>
            </fieldset>

            <div class="putt-row">
              <label for="puttsInput">Putts</label>
              <select id="puttsInput" name="putts" required>
                <option value="">Select</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
            <div id="puttDistanceFields" class="putt-distance-grid"></div>

            <p class="form-error" id="formError" aria-live="polite"></p>

            <div class="action-row">
              <button class="secondary-action" type="button" id="prevHoleBtn">Previous</button>
              <button class="primary-action" type="submit" id="nextHoleBtn">Next hole</button>
            </div>
          </form>
        </section>

        <section id="analyticsView" class="view">
          <div class="stats-grid" id="statsGrid"></div>
          <div class="chart-panel"><h2>Score Over Time</h2><canvas id="scoreTrendChart"></canvas></div>
          <div class="chart-panel"><h2>Approach Accuracy</h2><canvas id="approachChart"></canvas></div>
          <div class="chart-panel"><h2>Putt Distance</h2><canvas id="puttChart"></canvas></div>
          <div class="chart-panel"><h2>Score vs GIR</h2><canvas id="girCorrelationChart"></canvas></div>
          <div class="chart-panel"><h2>Score vs 3-Putts</h2><canvas id="threePuttCorrelationChart"></canvas></div>
        </section>

        <section id="roundsView" class="view">
          <div class="panel">
            <div class="round-actions">
              <button class="secondary-action" type="button" id="exportJsonBtn">Export JSON</button>
              <button class="secondary-action" type="button" id="exportCsvBtn">Export CSV</button>
            </div>
          </div>
          <div id="roundList" class="round-list"></div>
        </section>
      </main>
    </div>

    <script src="chart.local.js"></script>
    <script src="app.js"></script>
  </body>
</html>
